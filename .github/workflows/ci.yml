name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y libgtest-dev cmake build-essential

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_TEST=ON

    - name: Build
      run: |
        cd build
        make

    - name: Run tests
      run: |
        cd build
        ./sum_test